<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王者荣耀造物节七周年动态海报</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: #262626;
  color: #fff;
  font-family: 'Inter', 'Helvetica Neue', 'PingFang SC', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }
img { max-width: 100%; height: auto; display: block; }

/* ── Custom Cursor ── */
#cursor {
  position: fixed; top: 0; left: 0;
  width: 16px; height: 16px;
  border-radius: 50%; background: rgba(200,200,200,0.8);
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, background 0.2s;
}
#cursor.hover { width: 40px; height: 40px; background: rgba(255,255,255,0.9); }
@media (pointer: coarse) { #cursor { display: none; } }

/* ── Navbar ── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 28px 48px;
  transition: background 0.3s;
}
.navbar.scrolled { background: rgba(10,10,10,0.95); backdrop-filter: blur(16px); }
.nav-logo {
  font-size: 16px; font-weight: 700; letter-spacing: 0.12em;
  color: #fff;
}
.nav-back {
  font-size: 13px; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.6);
  transition: color 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.nav-back:hover { color: #fff; }
.nav-back svg { width: 16px; height: 16px; }

/* ── Hero Section ── */
.hero {
  position: relative; min-height: 60vh;
  display: flex; flex-direction: column;
  justify-content: flex-end; align-items: center;
  padding: 120px 48px 60px;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #1a0a2e 0%, #0a0a0a 50%, #2d1b4e 100%);
}
.hero-content {
  position: relative; z-index: 2; text-align: center;
  max-width: 900px;
}
.hero-label {
  font-size: 12px; letter-spacing: 0.2em;
  color: rgba(255,255,255,0.5); margin-bottom: 20px;
}
.hero-title {
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 700; line-height: 1.2; margin-bottom: 20px;
  color: #fff;
}
.hero-desc {
  font-size: clamp(14px, 2vw, 17px);
  line-height: 1.8; color: rgba(255,255,255,0.6);
}

/* ── Section Title ── */
.section-title-wrap { text-align: center; margin-bottom: 20px; }
.section-title {
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.05em;
}

/* ── Gallery Grid ── */
.gallery-section {
  padding: 60px 48px 120px;
  max-width: 1902px;
  margin: 0 auto;
}
.gallery-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  max-width: 1400px;
  margin: 0 auto;
}
.gallery-item {
  break-inside: avoid;
  margin-bottom: 16px;
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.gallery-item.visible {
  opacity: 1;
  transform: translateY(0);
}
.gallery-item img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}

/* ── Footer ── */
.footer {
  background: #111; padding: 60px 48px;
  text-align: center;
}
.footer-logo {
  font-size: 24px; font-weight: 700;
  letter-spacing: 0.12em; color: #fff; margin-bottom: 16px;
}
.footer-text {
  font-size: 13px; color: rgba(255,255,255,0.4);
  margin-bottom: 24px;
}
.footer-link {
  font-size: 13px; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.5); transition: color 0.2s;
}
.footer-link:hover { color: #fff; }

/* ── Responsive ── */
@media (max-width: 1024px) {
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .navbar { padding: 16px 20px; }
  .nav-logo { font-size: 14px; }
  .nav-back { font-size: 12px; gap: 4px; }
  .hero { padding: 100px 20px 40px; min-height: auto; }
  .hero-label { font-size: 10px; margin-bottom: 16px; }
  .hero-title { font-size: clamp(24px, 7vw, 40px); }
  .hero-desc { font-size: clamp(13px, 3vw, 15px); }
  .gallery-section { padding: 40px 20px 60px; }
  .gallery-grid { grid-template-columns: 1fr; gap: 12px; }
  .gallery-item { margin-bottom: 12px; }
  .gallery-item img { border-radius: 10px; }
  .gallery-item video { border-radius: 10px; }
  .section-title-wrap { margin-bottom: 16px; }
  .section-title { font-size: clamp(20px, 5vw, 28px); }
  .footer { padding: 40px 20px; }
  .footer-logo { font-size: 18px; }
}
</style>
<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && e.key === 's') || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.shiftKey && (e.key === 'i' || e.key === 'C' || e.key === 'J'))) {
    e.preventDefault();
  }
});
</script>
</head>
<body>

<!-- Custom Cursor -->
<div id="cursor"></div>

<!-- Navbar -->
<nav class="navbar" id="navbar">
  <div class="nav-logo">ALUYA</div>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    返回作品集
  </a>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-label">DYNAMIC POSTER DESIGN</div>
    <h1 class="hero-title">王者荣耀造物节&七周年动态海报</h1>
    <p class="hero-desc">项目参与：三维建模搭框架、渲染</p>
  </div>
</section>

<!-- Gallery -->
<section class="gallery-section">
  <div class="gallery-grid">
    <div class="gallery-item"><img src="img/WZRY/01.webp" alt="01"></div>
    <div class="gallery-item"><img src="img/WZRY/02.webp" alt="02"></div>
    <div class="gallery-item"><img src="img/WZRY/03.webp" alt="03"></div>
    <div class="gallery-item">
      <video src="img/WZRY/04.mp4" autoplay muted loop playsinline style="width:100%;border-radius:12px;"></video>
    </div>
    <div class="gallery-item"><img src="img/WZRY/05.webp" alt="05"></div>
    <div class="gallery-item"><img src="img/WZRY/06.webp" alt="06"></div>
    <div class="gallery-item"><img src="img/WZRY/07.webp" alt="07"></div>
  </div>
</section>

<!-- Other KV Posters -->
<section class="gallery-section" style="padding-top:20px;">
  <div class="section-title-wrap">
    <h2 class="section-title">其他KV海报</h2>
  </div>
  <div class="gallery-grid" style="margin-top:40px;">
    <div class="gallery-item"><img src="img/WZRY/08.webp" alt="08"></div>
    <div class="gallery-item"><img src="img/WZRY/09.webp" alt="09"></div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="footer-logo">ALUYA</div>
  <p class="footer-text">© 2026 阿莉路亚作品集 · 品牌全案设计</p>
  <a href="index.html" class="footer-link">← 返回作品集</a>
</footer>

<script>
// Custom Cursor
(function() {
  const cursor = document.getElementById('cursor');
  if (!cursor) return;
  let mx = -100, my = -100;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  function animate() {
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
    requestAnimationFrame(animate);
  }
  animate();
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a, button')) cursor.classList.add('hover');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('a, button')) cursor.classList.remove('hover');
  });
})();

// Navbar scroll
(function() {
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 60);
  });
})();

// Gallery Reveal Animation
(function() {
  const items = document.querySelectorAll('.gallery-item');
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => {
          e.target.classList.add('visible');
        }, i * 80);
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
  items.forEach(el => io.observe(el));
})();
</script>
<script>
document.querySelectorAll('img:not([loading])').forEach(img => {
  img.loading = 'lazy';
  img.decoding = 'async';
});
</script>
</body>
</html>
